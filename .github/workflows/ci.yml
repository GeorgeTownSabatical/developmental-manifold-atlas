name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e ".[dev]"
      - run: dmatlas validate
      - run: dmatlas normalize
      - run: dmatlas analyze
      - run: dmatlas quality
      - run: dmatlas standards
      - run: dmatlas backend
      - run: dmatlas eligibility
      - run: dmatlas hypotheses
      - run: dmatlas report
      - run: pytest
